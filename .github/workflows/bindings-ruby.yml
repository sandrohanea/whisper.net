name: Bindings Tests (Ruby)

on:
  push:
    branches:
      - master
    paths:
      - bindings/ruby/**
      - include/whisper.h
      - examples/common-whisper.h
      - ggml/include/ggml.h

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - bindings/ruby/**
      - include/whisper.h
      - examples/common-whisper.h
      - ggml/include/ggml.h

jobs:
  ubuntu-22:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: bindings/ruby
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - uses: actions/checkout@v6
      - run: rake test
