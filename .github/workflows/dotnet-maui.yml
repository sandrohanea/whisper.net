# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Dotnet Maui Build and Test
permissions:
  contents: read

on:
  workflow_call:

jobs:
  dotnet-maui-build:
    runs-on: macos-26

    env:
      USE_WHISPER_MAUI: "TRUE"
      USE_WHISPER_MAUI_TESTS: "TRUE"

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: "26.5"

      - name: Download Artifacts
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          path: runtimes

      - name: Install dotnet workloads
        run: |
          dotnet workload install maui --ignore-failed-sources
          dotnet workload install tvos --ignore-failed-sources

      - name: Restore dependencies
        run: dotnet restore ./Whisper.net.Maui.Tests.slnx

      - name: Install xharness
        run: dotnet tool install Microsoft.DotNet.XHarness.CLI --global --version "10.0.0-*"

      - name: Ensure simulator
        run: xharness apple simulators install ios-simulator_26.5

      - name: Build ios-simulator
        run: dotnet build ./tests/Whisper.net.Tests.Maui/Whisper.net.Tests.Maui.csproj -c Debug -f net10.0-ios -r iossimulator-arm64 -p:EmbedAssembliesIntoAppBundle=true -p:CodesignKey="" -p:CodesignProvision=""

      - name: Build android
        run: dotnet build ./tests/Whisper.net.Tests.Maui/Whisper.net.Tests.Maui.csproj -c Debug -f net10.0-android -p:EmbedAssembliesIntoApk=true

      - name: Upload apk and ios app
        uses: actions/upload-artifact@v6
        with:
          name: maui-build-artifacts
          path: |
            ./tests/Whisper.net.Tests.Maui/bin/Debug/net10.0-ios/iossimulator-arm64/Whisper.net.Tests.Maui.app
            ./tests/Whisper.net.Tests.Maui/bin/Debug/net10.0-android/com.companyname.whisper.net.tests.maui-Signed.apk

  dotnet-maui-test-android:
    runs-on: ubuntu-latest
    needs: dotnet-maui-build

    env:
      USE_WHISPER_MAUI: "TRUE"

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download Artifacts
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          name: maui-build-artifacts
          path: maui-build-artifacts

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install xharness
        run: dotnet tool install Microsoft.DotNet.XHarness.CLI --global --version "10.0.0-*"

      - name: run android tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 29
          arch: x86_64
          script: xharness android test --app=./maui-build-artifacts/net10.0-android/com.companyname.whisper.net.tests.maui-Signed.apk -p com.companyname.whisper.net.tests.maui -i com.companyname.whisper.net.tests.maui.AndroidMauiTestInstrumentation -o=./test-results/android

      - name: Upload Maui Android xharness test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: xharness-android-test-results
          path: |
            ./test-results/*

  dotnet-maui-test-ios:
    runs-on: macos-26
    needs: dotnet-maui-build

    env:
      USE_WHISPER_MAUI: "TRUE"

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: "26.5"

      - name: Download Artifacts
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          name: maui-build-artifacts
          path: maui-build-artifacts

      - name: Install xharness
        run: dotnet tool install Microsoft.DotNet.XHarness.CLI --global --version "10.0.0-*"

      - name: Ensure simulator
        run: xharness apple simulators install ios-simulator_26.5

      - name: run ios tests
        run: xharness apple test --app=./maui-build-artifacts/net10.0-ios/iossimulator-arm64/Whisper.net.Tests.Maui.app --output-directory=./test-results/ios --target=ios-simulator-64 --device="iPhone 17" --timeout "00:30:00"
      - name: Upload Maui iOS xharness test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: xharness-ios-test-results
          path: |
            ./test-results/*
